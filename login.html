<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login — RoomBook</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f5f3; --surface: #fff; --border: #e2e1da;
  --text: #1a1a18; --muted: #6b6a65;
  --blue: #185FA5; --blue-dark: #0C447C; --blue-light: #E6F1FB;
  --red-bg: #FCEBEB; --red: #A32D2D;
  --green-bg: #EAF3DE; --green: #3B6D11;
  --radius: 8px; --radius-lg: 12px;
}
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
       background: var(--bg); color: var(--text); min-height: 100vh;
       display: flex; align-items: center; justify-content: center; padding: 1rem; }

.card { background: var(--surface); border: 1px solid var(--border);
        border-radius: 16px; padding: 2.5rem 2rem; width: 100%; max-width: 400px;
        box-shadow: 0 4px 24px rgba(0,0,0,.07); }
.brand { font-size: 22px; font-weight: 700; color: var(--blue); margin-bottom: 4px; }
.brand span { font-weight: 400; color: var(--muted); font-size: 14px; display: block; margin-top: 2px; }
.divider { height: 1px; background: var(--border); margin: 1.5rem 0; }

label { font-size: 12px; font-weight: 600; color: var(--muted);
        text-transform: uppercase; letter-spacing: .4px; display: block; margin-bottom: 5px; }
input { width: 100%; padding: 9px 12px; border: 1px solid var(--border);
        border-radius: var(--radius); font-size: 14px; background: var(--bg);
        color: var(--text); outline: none; transition: border .15s; }
input:focus { border-color: var(--blue); background: #fff; box-shadow: 0 0 0 3px rgba(24,95,165,.1); }
.field { margin-bottom: 14px; }

.btn { width: 100%; padding: 10px; font-size: 14px; font-weight: 600;
       background: var(--blue); color: #fff; border: none;
       border-radius: var(--radius); cursor: pointer; transition: background .15s; margin-top: 4px; }
.btn:hover { background: var(--blue-dark); }
.btn:disabled { background: var(--border); color: var(--muted); cursor: not-allowed; }

.msg { font-size: 12px; padding: 8px 12px; border-radius: var(--radius);
       margin-top: 10px; display: none; }
.msg.error   { background: var(--red-bg);   color: var(--red);   display: block; }
.msg.success { background: var(--green-bg); color: var(--green); display: block; }

.switch-link { text-align: center; font-size: 13px; color: var(--muted); margin-top: 1.25rem; }
.switch-link a { color: var(--blue); text-decoration: none; font-weight: 600; }
.switch-link a:hover { text-decoration: underline; }

/* Toast */
.toast { position: fixed; bottom: 24px; right: 24px; background: #1a1a18; color: #fff;
         padding: 11px 18px; border-radius: var(--radius); font-size: 13px; font-weight: 500;
         opacity: 0; transform: translateY(8px); transition: all .2s; pointer-events: none; z-index: 999; }
.toast.show { opacity: 1; transform: translateY(0); }
</style>
</head>
<body>
<div class="card">
  <div class="brand">📅 RoomBook <span>Conference Room Management</span></div>
  <div class="divider"></div>
  <h2 style="font-size:17px;font-weight:600;margin-bottom:1.25rem;">Sign in to your account</h2>

  <div class="field">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@company.com" autofocus>
  </div>
  <div class="field">
    <label>Password</label>
    <input type="password" id="password" placeholder="••••••••">
  </div>
  <div class="msg" id="msg"></div>
  <button class="btn" id="loginBtn" onclick="doLogin()">Sign In</button>

  <div class="switch-link">Don't have an account? <a href="signup.html">Sign up</a></div>
  <div style="margin-top:1rem;text-align:center;font-size:12px;color:var(--muted)">
   
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'http://127.0.0.1:5000';

// Enter key support
['email','password'].forEach(id => {
  document.getElementById(id).addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
});

function showToast(msg, duration = 3000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function showMsg(text, type = 'error') {
  const m = document.getElementById('msg');
  m.textContent = text;
  m.className = 'msg ' + type;
}

async function doLogin() {
  const email    = document.getElementById('email').value.trim();
  const password = document.getElementById('password').value.trim();
  const btn      = document.getElementById('loginBtn');

  if (!email || !password) { showMsg('Please fill in all fields.'); return; }

  btn.disabled = true; btn.textContent = 'Signing in…';

  try {
    const res  = await fetch(API + '/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ email, password })
    });
    const data = await res.json();

    if (data.status === 'success') {
      localStorage.setItem('user', JSON.stringify(data.user));
      showToast('Welcome ' + data.user.email + ' 👋');
      setTimeout(() => {
        window.location.href = data.user.role === 'admin' ? 'admin.html' : 'dashboard.html';
      }, 800);
    } else {
      showMsg(data.msg || 'Login failed. Check credentials.');
    }
  } catch (err) {
    showMsg('Cannot connect to server. Is Flask running?');
  }

  btn.disabled = false; btn.textContent = 'Sign In';
}

// Redirect if already logged in
const saved = localStorage.getItem('user');
if (saved) {
  const u = JSON.parse(saved);
  window.location.href = u.role === 'admin' ? 'admin.html' : 'dashboard.html';
}
</script>
</body>
</html>
